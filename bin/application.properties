# ── Database (override in application-local.properties) ──────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/budgeting_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=240407

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Static files ──────────────────────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/

# ── Jackson / Hibernate extras ────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true