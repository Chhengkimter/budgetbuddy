# =============================================
#  Database Configuration (MySQL)
#  Change the values below to match your setup
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/budgeting_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=240407
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
#  JPA / Hibernate Configuration
# =============================================
# update = auto-updates tables when you change models
# create-drop = drops and recreates tables on startup (use for testing)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
#  App Port (default is 8080)
# =============================================
server.port=8080

# =============================================
#  Static files (HTML/CSS/JS)
# =============================================
spring.web.resources.static-locations=classpath:/static/

# Prevents lazy-loading errors during JSON serialization
spring.jackson.serialization.fail-on-empty-beans=false

# Stops Hibernate from trying to serialize lazy proxies
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true