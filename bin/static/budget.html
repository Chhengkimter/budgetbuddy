<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Budget Plan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/budget.css"/>
</head>
<body>
<script src="js/budget.js"></script>

<nav class="navbar">
    <div class="navbar__logo">
        <div class="navbar__logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0
                       1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12
                       c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182
                       s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7
                       a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2
                       M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
        <a class="nav__link active" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2
                       a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10
                       m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2
                       a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12
                       l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
    </div>

    <div class="navbar__right">
    <span class="navbar__period">April 2026</span>
    <button class="btn-add" onclick="openBudgetModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        New Budget
    </button>
    <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
</div>
</nav>

<main class="page">
    <div class="greeting">
        <h2 class="greeting__title">Budget plan</h2>
        <p class="greeting__sub">April 2026</p>
    </div>

    <div class="budget-master-grid">
        
        <div class="card header-stat-card">
            <span class="budget-card-label">Total Budget</span>
            <div class="budget-card-amount text-primary" data-budget-total>$0.00</div>
        </div>
        
        <div class="card header-stat-card card-spend-bg">
            <div class="spend-header-row">
                <span class="budget-card-label text-danger">Total Spend</span>
                <span class="pct-used-badge" data-budget-percent>0% used</span>
            </div>
            <div class="budget-card-amount text-danger" data-budget-spent>$0.00</div>
        </div>

        <div class="card content-card">
            <div class="card__hdr"><span class="card__title">Category budgets</span></div>
            <div class="budget-list" id="budgetListContainer">
                <div class="budget-item-wrap">
                    <div class="budget-meta-info"><span>Loading...</span></div>
                </div>
            </div>

            <div class="divider-line"></div>
            
            <div class="card__hdr" style="margin-bottom: 16px;"><span class="card__title" style="font-size: 28px;">Monthly savings goal</span></div>
            <div class="budget-item-wrap">
                <div class="budget-meta-info"><span>Overall progress</span><span class="bold-amt">$450 / $600 target</span></div>
                <div class="progress-container"><div class="progress-bar-fill" style="width: 75%; background: var(--primary);"></div></div>
            </div>
        </div>

        <div class="card content-card">
            <div class="card__hdr"><span class="card__title">Edit category limit</span></div>
            <form id="budgetLimitForm">
                <div class="form-group">
                    <label for="budgetCategory">Category</label>
                    <select id="budgetCategory" name="category" required>
                        <option value="FOOD">Food</option>
                        <option value="TRANSPORTATION">Transportation</option>
                        <option value="ENTERTAINMENT">Entertainment</option>
                        <option value="SAVING">Saving</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="monthlyLimit">Monthly limit ($)</label>
                    <input type="number" step="0.01" id="monthlyLimit" name="limitAmount" value="350" required>
                </div>
                <button type="button" class="btn-submit-action">Update limit</button>
            </form>
        </div>

    </div>
</main>

<!-- BUDGET MODAL -->
<div id="budgetModal" class="modal" style="display: none;">
    <div class="modal__content">
        <div class="modal__hdr">
            <div>
                <div class="modal__title">Create Budget</div>
                <div class="modal__sub">Set up a new budget category</div>
            </div>
            <button class="modal__close" onclick="closeBudgetModal()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="modal__form-row">
            <div class="form-group">
                <label>Budget Name</label>
                <input id="budgetName" type="text" placeholder="e.g. Monthly Spending" required/>
            </div>
        </div>

        <div class="modal__form-row">
            <div class="form-group">
                <label>Category</label>
                <select id="budgetCategory" required>
                    <option value="">Select a category</option>
                    <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Housing">Housing</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Health">Health</option>
                    <option value="Saving">Saving</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input id="budgetAmount" type="number" placeholder="0.00" min="0.01" step="0.01" required/>
            </div>
        </div>

        <div class="modal__form-row">
            <div class="form-group">
                <label>Description (Optional)</label>
                <input id="budgetDescription" type="text" placeholder="e.g. Monthly food expenses" />
            </div>
        </div>

        <div id="budgetError" style="color: #e74c3c; margin-bottom: 10px; display: none;"></div>

        <div class="modal__footer">
            <button class="btn-cancel" onclick="closeBudgetModal()">Cancel</button>
            <button class="btn-save" onclick="handleCreateBudget()">Create Budget</button>
        </div>
    </div>
</div>

</body>
</html>
