<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Transactions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/transaction.css"/>
    <style>
        .badge-saving { background: #DBEAFE; color: #3B82F6; }
        .tx-amount-saving { color: #3B82F6; font-weight: 600; }
        
        /* Month Navigation Toolbelt Styling */
        .month-navigation {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #F3F4F6;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            color: #374151;
        }
        .month-nav-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #4B5563;
            transition: color 0.2s;
            padding: 0 4px;
        }
        .month-nav-btn:hover {
            color: #111827;
        }
        .current-month-display {
            min-width: 110px;
            text-align: center;
            font-size: 15px;
            user-select: none;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar__logo">
        <div class="navbar__logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2
                       a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10
                       m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2
                       a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12
                       l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
        <a class="nav__link active" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7
                       a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2
                       M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
    </div>

    <div class="navbar__right">
        <div class="month-navigation">
            <button class="month-nav-btn" onclick="changeMonth(-1)">←</button>
            <span class="current-month-display" id="txCalendarNavLabel">Loading...</span>
            <button class="month-nav-btn" onclick="changeMonth(1)">→</button>
        </div>
        <button class="btn-add" onclick="openTxModal()">+ Transaction</button>
        <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
    </div>
</nav>

<main class="page">
    <div class="page-header-row">
        <h2 class="page-title">All transactions</h2>
        <button class="btn-export">Export CSV</button>
    </div>

    <div class="filter-row">
        <button class="filter-pill active" onclick="filterTransactions('ALL')">All</button>
        <button class="filter-pill" onclick="filterTransactions('INCOME')">Income</button>
        <button class="filter-pill" onclick="filterTransactions('EXPENSE')">Expense</button>
        <button class="filter-pill" onclick="filterTransactions('SAVING')">Saving</button>
    </div>

    <div class="category-action-bar">
        <button class="btn-manage-cats" onclick="openCategoryModal()">⚙️ Manage Category</button>
    </div>

    <div class="card table-card">
        <table class="data-table">
            <thead>
                <tr>
                    <th>TITLE / NOTE</th>
                    <th>CATEGORY / TARGET</th>
                    <th>DATE</th>
                    <th>AMOUNT</th>
                    <th>TYPE</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="transactionTableBody">
                </tbody>
        </table>
    </div>
</main>

<div class="overlay" id="txOverlay">
    <div class="modal">
        <h3 class="modal__title">Add transaction</h3>
        <form id="txFormPayloadContainer">
            <div class="type-selector-tabs">
                <button type="button" class="type-tab active" onclick="setTxType('EXPENSE')">Expense</button>
                <button type="button" class="type-tab" onclick="setTxType('INCOME')">Income</button>
                <button type="button" class="type-tab" onclick="setTxType('SAVING')">Saving</button>
            </div>

            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" step="0.01" placeholder="0.00" id="txAmount" required/>
            </div>

            <div class="form-grid-split">
                <div class="form-group" id="txCategoryFieldWrapper">
                    <label>Budget Category</label>
                    <select id="txCategorySelect">
                        <option value="FOOD">Food</option>
                        <option value="TRANSPORTATION">Transportation</option>
                        <option value="ENTERTAINMENT">Entertainment</option>
                    </select>
                </div>
                <div class="form-group" id="txGoalFieldWrapper" style="display: none;">
                    <label>Link to Saving Goal</label>
                    <select id="txGoalSelect">
                        <option value="Retirement Fund">🏦 Retirement Fund</option>
                        <option value="New Dress">👗 New Dress</option>
                        <option value="Trip to China">✈️ Trip to China</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="txRealtimeDateInput" required/>
                </div>
            </div>

            <div class="form-group">
                <label>Note (optional)</label>
                <input type="text" placeholder="e.g. Flight booking ticket" id="txNote"/>
            </div>

            <div class="modal__footer">
                <button type="button" class="btn-cancel" onclick="closeTxModal()">Cancel</button>
                <button type="button" class="btn-save" onclick="addManualTransactionToDB()">Save transaction</button>
            </div>
        </form>
    </div>
</div>

<div class="overlay" id="categoryOverlay">
    <div class="modal" style="max-width: 550px;">
        <h3 class="modal__title">Manage categories</h3>
        <div class="add-category-input-group">
            <input type="text" placeholder="New category name..."/>
            <button type="button" class="btn-add-cat-submit">Add</button>
        </div>
        <div class="modal__footer" style="margin-top: 20px;">
            <button type="button" class="btn-cancel" style="width: 100%;" onclick="closeCategoryModal()">Close</button>
        </div>
    </div>
</div>

<script>
    let currentFilter = 'ALL';
    let currentActiveDate = new Date(); // Tracks page view month context
    let transactionsData = [];

    const monthNamesList = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function updateNavLabel() {
        document.getElementById('txCalendarNavLabel').innerText = `${monthNamesList[currentActiveDate.getMonth()]} ${currentActiveDate.getFullYear()}`;
    }

    async function changeMonth(direction) {
        currentActiveDate.setMonth(currentActiveDate.getMonth() + direction);
        updateNavLabel();
        await fetchTransactionsFromDB();
    }

    // ==========================================
    // BACKEND REST CONTROLLER DATA CONNECTIONS
    // ==========================================
    async function fetchTransactionsFromDB() {
        const queryMonth = currentActiveDate.getMonth() + 1;
        const queryYear = currentActiveDate.getFullYear();

        try {
            // REST API gpping passing calendar context filters
            const response = await fetch(`/api/transactions?month=${queryMonth}&year=${queryYear}`);
            if(!response.ok) throw new Error();
            transactionsData = await response.json();
            renderTransactions();
        } catch (e) {
            console.warn("REST Endpoint missing. Serving query matching database schema parameters for:", queryMonth, "/", queryYear);
            
            // Full fallback datasets matching actual entity mappings dynamically
            const fullMockSet = [
                { id: 1, note: "Dinner with teammates", category: "Food", date: "2026-05-20", amount: 45.50, type: "EXPENSE" },
                { id: 2, note: "Monthly Salary Payout", category: "Salary", date: "2026-05-01", amount: 2500.00, type: "INCOME" },
                { id: 3, note: "Trip to China Ticket", category: "Trip to China", date: "2026-04-20", amount: 100.00, type: "SAVING" },
                { id: 4, note: "Gas refill station", category: "Transportation", date: "2026-05-18", amount: 30.00, type: "EXPENSE" },
                { id: 5, note: "Retirement allocation", category: "Retirement Fund", date: "2026-05-02", amount: 1500.00, type: "SAVING" }
            ];

            // Filter down local mockup dataset rows matching selection context programmatically
            transactionsData = fullMockSet.filter(tx => {
                const txDateObj = new Date(tx.date);
                return (txDateObj.getMonth() + 1) === queryMonth && txDateObj.getFullYear() === queryYear;
            });

            renderTransactions();
        }
    }

    function renderTransactions() {
        const tbody = document.getElementById('transactionTableBody');
        tbody.innerHTML = "";

        const filtered = transactionsData.filter(tx => {
            if (currentFilter === 'ALL') return true;
            return tx.type === currentFilter;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:#6B7280;">No transactions recorded for this month.</td></tr>`;
            return;
        }

        filtered.forEach(tx => {
            const tr = document.createElement('tr');
            let typeClass = tx.type.toLowerCase();
            let sign = tx.type === 'EXPENSE' ? '-' : '+';

            tr.innerHTML = `
                <td><strong>${tx.note}</strong></td>
                <td><span style="font-size: 13px; font-weight: 500; color: #4B5563;">${tx.category}</span></td>
                <td>${tx.date}</td>
                <td><span class="tx-amount-${typeClass}">${sign}$${tx.amount.toFixed(2)}</span></td>
                <td><span class="badge-type badge-${typeClass}">${tx.type}</span></td>
                <td><button class="delete-icon-btn" onclick="deleteTransactionRowFromDB(${tx.id})">🗑</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function filterTransactions(type) {
        currentFilter = type;
        const pills = document.querySelectorAll('.filter-pill');
        pills.forEach(pill => pill.classList.remove('active'));
        event.target.classList.add('active');
        renderTransactions();
    }

    async function addManualTransactionToDB() {
        const amount = parseFloat(document.getElementById('txAmount').value) || 0;
        const note = document.getElementById('txNote').value || "Manual Entry";
        const date = document.getElementById('txRealtimeDateInput').value;
        const activeTab = document.querySelector('.type-tab.active').innerText.toUpperCase();
        
        let category = "";
        if (activeTab === 'SAVING') {
            category = document.getElementById('txGoalSelect').value;
        } else if (activeTab === 'INCOME') {
            category = "Income Flow";
        } else {
            category = document.getElementById('txCategorySelect').value;
        }

        if(amount <= 0 || !date) {
            alert("Please provide proper amount and date metrics.");
            return;
        }

        const payload = { note, category, date, amount, type: activeTab };
        console.log("POST Request payload sent upstream to /api/transactions:", payload);
        
        /*
        await fetch('/api/transactions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        */
        
        closeTxModal();
        // Sync active view calendar page with newly posted records date 
        const freshDate = new Date(date);
        currentActiveDate.setMonth(freshDate.getMonth());
        currentActiveDate.setFullYear(freshDate.getFullYear());
        updateNavLabel();
        
        await fetchTransactionsFromDB();
    }

    async function deleteTransactionRowFromDB(id) {
        console.log(`DELETE request context sent upstream to /api/transactions/${id}`);
        /*
        await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
        */
        await fetchTransactionsFromDB();
    }

    // Modal state controls
    function openTxModal() { document.getElementById('txOverlay').classList.add('open'); }
    function closeTxModal() { document.getElementById('txOverlay').classList.remove('open'); }
    function openCategoryModal() { document.getElementById('categoryOverlay').classList.add('open'); }
    function closeCategoryModal() { document.getElementById('categoryOverlay').classList.remove('open'); }
    
    function setTxType(type) {
        document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        if(type === 'SAVING') {
            document.getElementById('txCategoryFieldWrapper').style.display = 'none';
            document.getElementById('txGoalFieldWrapper').style.display = 'block';
        } else {
            document.getElementById('txCategoryFieldWrapper').style.display = 'block';
            document.getElementById('txGoalFieldWrapper').style.display = 'none';
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        document.getElementById('txRealtimeDateInput').valueAsDate = new Date();
        updateNavLabel();
        await fetchTransactionsFromDB();
    });
</script>
</body>
</html>
