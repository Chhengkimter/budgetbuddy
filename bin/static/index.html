<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetApp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Navigation ──────────────────────────────── -->
<nav class="navbar">
    <div class="nav-brand">💰 BudgetApp</div>
    <div class="nav-links" id="navLinks">
        <span id="navUsername"></span>
        <button class="btn btn-outline" id="logoutBtn" onclick="logout()" style="display:none">Logout</button>
    </div>
</nav>

<!-- ── Login / Register Section ───────────────── -->
<section id="authSection" class="container">
    <div class="auth-box">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Welcome Back</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="input-field">
            <input type="password" id="loginPassword" placeholder="Password" class="input-field">
            <button class="btn btn-primary full-width" onclick="login()">Login</button>
            <p id="loginError" class="error-msg"></p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none">
            <h2>Create Account</h2>
            <input type="text" id="regName" placeholder="Full Name" class="input-field">
            <input type="email" id="regEmail" placeholder="Email" class="input-field">
            <input type="password" id="regPassword" placeholder="Password" class="input-field">
            <button class="btn btn-primary full-width" onclick="register()">Register</button>
            <p id="registerError" class="error-msg"></p>
        </div>
    </div>
</section>

<!-- ── Dashboard Section ───────────────────────── -->
<section id="dashboardSection" class="container" style="display:none">

    <!-- Summary Cards -->
    <div class="cards-grid">
        <div class="card card-green">
            <h3>Total Income</h3>
            <p id="totalIncome" class="card-amount">$0.00</p>
        </div>
        <div class="card card-red">
            <h3>Total Expenses</h3>
            <p id="totalExpenses" class="card-amount">$0.00</p>
        </div>
        <div class="card card-blue">
            <h3>Net Balance</h3>
            <p id="netBalance" class="card-amount">$0.00</p>
        </div>
    </div>

    <!-- Budgets Section -->
    <div class="section-header">
        <h2>My Budgets</h2>
        <button class="btn btn-primary" onclick="openBudgetModal()">+ New Budget</button>
    </div>
    <div id="budgetsList" class="budgets-grid"></div>

    <!-- Transactions Section -->
    <div class="section-header">
        <h2>Recent Transactions</h2>
        <button class="btn btn-primary" onclick="openTransactionModal()">+ Add Transaction</button>
    </div>
    <div id="transactionsList" class="transactions-list"></div>
</section>

<!-- ── Budget Modal ─────────────────────────────── -->
<div id="budgetModal" class="modal" style="display:none">
    <div class="modal-content">
        <h2>Create New Budget</h2>
        <input type="text" id="budgetName" placeholder="Budget Name (e.g. Monthly Budget)" class="input-field">
        <input type="number" id="budgetAmount" placeholder="Total Amount" class="input-field">
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('budgetModal')">Cancel</button>
            <button class="btn btn-primary" onclick="createBudget()">Create</button>
        </div>
        <p id="budgetError" class="error-msg"></p>
    </div>
</div>

<!-- ── Transaction Modal ────────────────────────── -->
<div id="transactionModal" class="modal" style="display:none">
    <div class="modal-content">
        <h2>Add Transaction</h2>
        <select id="txBudgetId" class="input-field"></select>
        <input type="text" id="txDescription" placeholder="Description" class="input-field">
        <input type="number" id="txAmount" placeholder="Amount" class="input-field">
        <select id="txType" class="input-field">
            <option value="INCOME">Income</option>
            <option value="EXPENSE">Expense</option>
        </select>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('transactionModal')">Cancel</button>
            <button class="btn btn-primary" onclick="addTransaction()">Add</button>
        </div>
        <p id="transactionError" class="error-msg"></p>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
