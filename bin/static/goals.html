<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Saving Goals</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/goals.css"/>
    <style>
        /* Top-Right header navigation controls alignment */
        .monthly-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .monthly-nav-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #F3F4F6;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #E5E7EB;
        }
        .btn-month-arrow {
            background: #ffffff;
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 800;
            padding: 2px 8px;
            cursor: pointer;
            color: #1F2937;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-month-arrow:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
        }
        .nav-month-label-text {
            font-size: 13px;
            font-weight: 700;
            color: #4B5563;
            min-width: 90px;
            text-align: center;
        }

        /* Linear Progress Trackers */
        .monthly-progress-container {
            width: 100%;
            height: 8px;
            background-color: #E5E7EB;
            border-radius: 999px;
            margin-top: 12px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .monthly-progress-bar-fill {
            height: 100%;
            width: 0%; 
            background: #10B981; 
            border-radius: 999px;
            transition: width 0.3s ease-in-out;
        }
        
        /* Interactive styling pointer */
        .goal-interactive-card, .dashed-add-card {
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar__logo">
        <div class="navbar__logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0
                       1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12
                       c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182
                       s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2
                       a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10
                       m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2
                       a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link active" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12
                       l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
        <a class="nav__link" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7
                       a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2
                       M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
    </div>

    <div class="navbar__right">
        <div id="liveTransactionDateDisplay" style="font-size: 22px; font-weight: 700; color: #6B7280;">Date: --/--/----</div>
        <button class="btn-add" onclick="navigateToGoalDetails('new')">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            New goal 
        </button>
        <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
    </div>
</nav>

<main class="page">
    <div class="greeting">
        <h2 class="greeting__title">Saving goals</h2>
        <p class="greeting__sub">Save and track your financial targets</p>
    </div>

    <div class="goals-master-grid">
        
        <div class="card stat-card">
            <span class="goals-card-label">Total saved</span>
            <div class="goals-card-amount text-green" id="displayTotalSaved">$8,940</div>
            <div class="goals-card-sub">across all goals</div>
        </div>
        
        <div class="card stat-card">
            <div class="monthly-card-header">
                <span class="goals-card-label">Monthly saving goal</span>
                <div class="monthly-nav-controls">
                    <button type="button" class="btn-month-arrow" onclick="adjustSelectedMonth(-1)">←</button>
                    <span class="nav-month-label-text" id="activeMonthLabel">May 2026</span>
                    <button type="button" class="btn-month-arrow" onclick="adjustSelectedMonth(1)">→</button>
                </div>
            </div>
            
            <div class="goals-card-amount text-dark" id="displayMonthlyTarget">$600</div>
            
            <div class="monthly-progress-container">
                <div class="monthly-progress-bar-fill" id="monthlyGoalProgressBarFill"></div>
            </div>
            <div class="goals-card-sub" id="displayMonthlyDeposited">$450 deposited this month</div>
        </div>

        <div id="goalsList" class="goals-card-grid"></div>

        <div class="card goal-interactive-card dashed-add-card" onclick="navigateToGoalDetails('new')">
            <div class="add-inner-element">
                <div class="plus-icon-symbol">+</div>
                <div class="desc-text">Add new goal</div>
            </div>
        </div>

    </div>

    <p class="bottom-helper-caption-text">Click any goal to view details and deposit →</p>
</main>

<script src="js/goals.js"></script>
</body>
</html>
