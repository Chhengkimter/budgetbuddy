<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Transactions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/transaction.css"/>
    <style>
        /* ── Recurring pill ── */
        .filter-pill.pill-recurring.active {
            background: #7C3AED;
            color: #fff;
            border-color: #7C3AED;
        }
        .filter-pill.pill-recurring:not(.active):hover {
            border-color: #7C3AED;
            color: #7C3AED;
        }

        /* ── Recurring row badge in table ── */
        .tag-recurring {
            background: #EDE9FE;
            color: #5B21B6;
            border: 1px solid #C4B5FD;
        }
        .tx-amount-recurring { color: #7C3AED; font-weight: 700; }

        /* ── Saving amount — uses its own neutral style, not green/red ── */
        .tx-amount-saving { color: #0EA5E9; font-weight: 700; }

        /* ── Recurring checkbox row in modal ── */
        .recurring-setup-box {
            margin-top: 14px;
            background: #F5F3FF;
            border: 1px solid #DDD6FE;
            border-radius: 10px;
            padding: 14px 16px;
            display: none; /* shown via JS when checkbox ticked */
        }
        .recurring-setup-box.visible { display: block; }
        .recurring-setup-box .form-row-2 { margin-top: 10px; }

        /* Recurring label chip next to name in table */
        .recurring-chip {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            background: #EDE9FE;
            color: #5B21B6;
            border-radius: 4px;
            padding: 1px 5px;
            margin-left: 5px;
            vertical-align: middle;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar__logo">
        <div class="navbar__logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
        <a class="nav__link active" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
    </div>

    <div class="navbar__right">
        <div class="month-navigation">
            <button class="month-nav-btn" onclick="changeMonth(-1)">←</button>
            <span id="txCalendarNavLabel">Loading...</span>
            <button class="month-nav-btn" onclick="changeMonth(1)">→</button>
        </div>
        <button class="btn-add" onclick="openTxModal()">+ Transaction</button>
        <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
    </div>
</nav>

<main class="page">
    <div class="page-header-row">
        <h2 class="page-title">All transactions</h2>
        <button class="btn-export">Export CSV</button>
    </div>

    <!--
        Filter pills
        ALL | INCOME | EXPENSE | SAVING | RECURRING
        SAVING  = one-off saving deposits (tracked independently, not in balance)
        RECURRING = any transaction auto-generated from a RecurringTransaction template
    -->
    <div class="filter-row">
        <button class="filter-pill active"              onclick="filterTransactions('ALL',       this)">All</button>
        <button class="filter-pill"                     onclick="filterTransactions('INCOME',    this)">Income</button>
        <button class="filter-pill"                     onclick="filterTransactions('EXPENSE',   this)">Expense</button>
        <button class="filter-pill"                     onclick="filterTransactions('SAVING',    this)">Saving</button>
        <button class="filter-pill pill-recurring"      onclick="filterTransactions('RECURRING', this)">
            🔁 Recurring
        </button>
    </div>

    <div class="card table-card">
        <table class="data-table">
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>DATE</th>
                    <th>AMOUNT</th>
                    <th>TYPE</th>
                    <th>BUDGET</th>
                    <th>GOAL</th>
                    <th>NOTE</th>
                </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
        </table>
    </div>
</main>

<!-- ════════════════════════════════════════════════════════════
     ADD TRANSACTION MODAL
     ════════════════════════════════════════════════════════════ -->
<div class="overlay" id="txOverlay" onclick="handleTxOverlayClick(event)">
    <div class="modal">
        <h3 class="modal__title">Add transaction</h3>
        <form id="addTransactionForm">

            <!-- Type tabs -->
            <div class="type-tabs">
                <button type="button" class="type-tab active" id="modalTabExpense" onclick="setModalTxType('EXPENSE')">Expense</button>
                <button type="button" class="type-tab"        id="modalTabIncome"  onclick="setModalTxType('INCOME')">Income</button>
                <button type="button" class="type-tab"        id="modalTabSaving"  onclick="setModalTxType('SAVING')">Saving</button>
            </div>

            <input type="hidden" id="modalTxTypeTracker" value="EXPENSE"/>

            <div class="form-group">
                <label>Transaction Title</label>
                <input type="text" placeholder="e.g. Walmart Grocery Run" id="txTitleInput" required/>
            </div>

            <div class="form-row-2">
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" placeholder="0.00" id="txAmountInput" required/>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="txRealtimeDateInput" required/>
                </div>
            </div>

            <!-- Dynamic fields injected by setModalTxType() -->
            <div id="modalDynamicFieldsWrapper"></div>

            <div class="form-group">
                <label>Note</label>
                <input type="text" placeholder="Optional description..." id="txNoteInput"/>
            </div>

            <!--
                Recurring setup — visible when the checkbox is ticked.
                Creates a RecurringTransaction template row in addition to
                the manual transaction being saved right now.

                NOTE: only shown for EXPENSE and INCOME tabs.
                For SAVING, the "Monthly Saving Goal" concept is handled
                via its own dedicated UI inside the Saving tab (see below).
            -->
            <div id="modalAutoSaveFeatureWrapper" style="display:none; margin-top:15px;">
                <label class="modal-checkbox-container">
                    <input type="checkbox" id="txAutoSaveRecurring" onchange="toggleRecurringSetup(this.checked)">
                    <span class="modal-custom-checkmark"></span>
                    Repeat this transaction every month automatically
                </label>

                <!-- Recurring config — only shown when checkbox is on -->
                <div class="recurring-setup-box" id="recurringSetupBox">
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Repeat on day</label>
                            <input type="number" id="recurringDayInput" min="1" max="28" placeholder="e.g. 1" value="1"/>
                        </div>
                        <div class="form-group">
                            <label>End date <span style="color:#9CA3AF;font-weight:400">(optional)</span></label>
                            <input type="date" id="recurringEndDateInput"/>
                        </div>
                    </div>
                    <p style="font-size:12px;color:#6B7280;margin-top:6px;">
                        A recurring template will be created. It generates a new transaction on the chosen day every month until the end date (or indefinitely).
                    </p>
                </div>
            </div>

            <div class="modal__footer">
                <button type="button" class="btn-cancel" onclick="closeTxModal()">Cancel</button>
                <button type="submit" class="btn-save">Save transaction</button>
            </div>
        </form>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════════════════════════ -->
<script>
    // ─────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────
    let currentFilter     = 'ALL';
    let currentActiveDate = new Date();
    let transactionsData  = [];   // raw list from API (or mock)

    const monthNamesList = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    // Budget + Goal options — in production these should be fetched from
    // /api/budgets?userID= and /api/goals?userID=
    const dbOptionsSource = {
        BUDGETS: [
            { value: "1", text: "Food & Groceries" },
            { value: "2", text: "Transportation" },
            { value: "3", text: "Entertainment" },
            { value: "4", text: "Utilities & Bills" }
        ],
        SAVING_BUDGETS: [
            { value: "5", text: "Monthly Saving Goal" }
        ],
        GOALS: [
            { value: "1", text: "Retirement Fund" },
            { value: "2", text: "New Dress" },
            { value: "3", text: "Trip to China" }
        ]
    };

    // ─────────────────────────────────────────────
    // Nav label
    // ─────────────────────────────────────────────
    function updateNavLabel() {
        document.getElementById('txCalendarNavLabel').innerText =
            `${monthNamesList[currentActiveDate.getMonth()]} ${currentActiveDate.getFullYear()}`;
    }

    async function changeMonth(direction) {
        currentActiveDate.setMonth(currentActiveDate.getMonth() + direction);
        updateNavLabel();
        await fetchTransactionsFromDB();
    }

    // ─────────────────────────────────────────────
    // Data fetch
    // ─────────────────────────────────────────────
    async function fetchTransactionsFromDB() {
        const qMonth  = currentActiveDate.getMonth() + 1;
        const qYear   = currentActiveDate.getFullYear();
        const userID  = getUserID();

        /*
         * RECURRING filter is a client-side concern derived from whether
         * recurringID is set on the transaction row.  We always fetch the full
         * month list from the server; filtering to "RECURRING" happens in
         * applyClientFilter() below.
         *
         * If you prefer a server-side shortcut you can pass &type=RECURRING to
         * GET /api/transactions — the controller and service support it.
         */
        try {
            const res = await fetch(
                `/api/transactions?userID=${userID}&month=${qMonth}&year=${qYear}`
            );
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            transactionsData = await res.json();
        } catch (e) {
            console.warn("API unavailable, using mock data:", e.message);
            transactionsData = getMockData();
        }

        renderTransactions();
    }

    // ─────────────────────────────────────────────
    // Filter pill handler
    // ─────────────────────────────────────────────
    function filterTransactions(type, clickedBtn) {
        currentFilter = type;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        if (clickedBtn) clickedBtn.classList.add('active');
        renderTransactions();
    }

    // ─────────────────────────────────────────────
    // Render
    // ─────────────────────────────────────────────
    function applyClientFilter(data) {
        if (currentFilter === 'ALL')       return data;
        if (currentFilter === 'RECURRING') return data.filter(tx => !!tx.recurringID);
        return data.filter(tx => tx.type === currentFilter);
    }

    function renderTransactions() {
        const tbody    = document.getElementById('transactionTableBody');
        tbody.innerHTML = '';

        const filtered = applyClientFilter(transactionsData);

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-table-msg">No transaction records found.</td></tr>`;
            return;
        }

        filtered.forEach(tx => {
            const tr        = document.createElement('tr');
            const isRecurring = !!tx.recurringID;

            /*
             * Amount display rules:
             *  INCOME   → green  +$X.XX
             *  EXPENSE  → red    -$X.XX
             *  SAVING   → blue   $X.XX  (no sign — saving is NOT part of balance)
             *  RECURRING→ inherits the underlying type sign but gets purple class
             */
            let amountClass, sign;
            if (isRecurring) {
                amountClass = 'tx-amount-recurring';
                sign        = tx.type === 'EXPENSE' ? '-' : tx.type === 'INCOME' ? '+' : '';
            } else if (tx.type === 'SAVING') {
                amountClass = 'tx-amount-saving';
                sign        = '';   // saving has no balance sign
            } else {
                amountClass = `tx-amount-${tx.type.toLowerCase()}`;
                sign        = tx.type === 'EXPENSE' ? '-' : '+';
            }

            const recurringChip = isRecurring
                ? `<span class="recurring-chip">🔁 recurring</span>`
                : '';

            // Type tag — recurring entries show their base type + a purple RECURRING tag
            const typeTagHtml = isRecurring
                ? `<span class="type-tag tag-recurring">RECURRING</span>`
                : `<span class="type-tag tag-${tx.type.toLowerCase()}">${tx.type}</span>`;

            tr.innerHTML = `
                <td><strong>${tx.transactionName ?? tx.name ?? '—'}</strong>${recurringChip}</td>
                <td>${tx.transactionDate ?? tx.date ?? '—'}</td>
                <td><span class="${amountClass}">${sign}$${Number(tx.transactionAmount ?? tx.amount ?? 0).toFixed(2)}</span></td>
                <td>${typeTagHtml}</td>
                <td><span class="column-meta-text">${tx.budgetName  ?? tx.budget  ?? '—'}</span></td>
                <td><span class="column-meta-text">${tx.goalName    ?? tx.goal    ?? '—'}</span></td>
                <td class="column-note-text">${tx.transactionNote ?? tx.note ?? '—'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ─────────────────────────────────────────────
    // Modal
    // ─────────────────────────────────────────────
    function openTxModal()  { document.getElementById('txOverlay').classList.add('open'); }
    function closeTxModal() { document.getElementById('txOverlay').classList.remove('open'); }
    function handleTxOverlayClick(e) { if (e.target.id === 'txOverlay') closeTxModal(); }

    function toggleRecurringSetup(checked) {
        document.getElementById('recurringSetupBox').classList.toggle('visible', checked);
    }

    function setModalTxType(type) {
        document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
        document.getElementById(`modalTab${type.charAt(0) + type.slice(1).toLowerCase()}`).classList.add('active');
        document.getElementById('modalTxTypeTracker').value = type;

        const fieldsWrapper       = document.getElementById('modalDynamicFieldsWrapper');
        const autoSaveWrapper     = document.getElementById('modalAutoSaveFeatureWrapper');
        const recurringCheckbox   = document.getElementById('txAutoSaveRecurring');
        fieldsWrapper.innerHTML   = '';

        // Reset recurring checkbox state when switching tabs
        if (recurringCheckbox) {
            recurringCheckbox.checked = false;
            toggleRecurringSetup(false);
        }

        if (type === 'EXPENSE') {
            autoSaveWrapper.style.display = 'block';
            fieldsWrapper.innerHTML = `
                <div class="form-group">
                    <label>Link to Budget</label>
                    <select id="txBudgetSelect" required></select>
                </div>`;
            populateSelect('txBudgetSelect', dbOptionsSource.BUDGETS);
        }
        else if (type === 'INCOME') {
            autoSaveWrapper.style.display = 'block';
            // Income has no extra dropdowns
        }
        else if (type === 'SAVING') {
            // Saving has NO recurring checkbox — it uses the Monthly Saving Goal
            // concept which is handled separately via RecurringTransaction.
            // Instead show a dedicated "Monthly Saving Goal" toggle here.
            autoSaveWrapper.style.display = 'none';

            fieldsWrapper.innerHTML = `
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Saving Budget</label>
                        <select id="txSavingBudgetSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>Goal</label>
                        <select id="txGoalSelect"></select>
                    </div>
                </div>

                <!--
                    Monthly Saving Goal toggle
                    When checked → POST /api/recurring to create a template
                    with RTransactionType=SAVING on the selected recurring day.
                    The generated transactions count toward goal progress but
                    are NEVER added to / subtracted from the user's balance.
                -->
                <div style="margin-top:12px;">
                    <label class="modal-checkbox-container">
                        <input type="checkbox" id="txMonthlySavingGoalToggle"
                               onchange="toggleMonthlySavingSetup(this.checked)">
                        <span class="modal-custom-checkmark"></span>
                        Make this a <strong>Monthly Saving Goal</strong> — repeat every month
                    </label>
                    <div class="recurring-setup-box" id="monthlySavingSetupBox">
                        <div class="form-row-2">
                            <div class="form-group">
                                <label>Deposit on day</label>
                                <input type="number" id="savingRecurringDayInput" min="1" max="28" placeholder="e.g. 1" value="1"/>
                            </div>
                            <div class="form-group">
                                <label>End date <span style="color:#9CA3AF;font-weight:400">(optional)</span></label>
                                <input type="date" id="savingRecurringEndDateInput"/>
                            </div>
                        </div>
                        <p style="font-size:12px;color:#6B7280;margin-top:6px;">
                            A recurring template will auto-deposit this amount toward your goal every month.
                            It will appear in the <strong>Recurring</strong> filter — not counted in your balance.
                        </p>
                    </div>
                </div>`;

            populateSelect('txSavingBudgetSelect', dbOptionsSource.SAVING_BUDGETS);
            populateSelectWithEmpty('txGoalSelect', dbOptionsSource.GOALS, '— No specific goal —');
        }
    }

    function toggleMonthlySavingSetup(checked) {
        document.getElementById('monthlySavingSetupBox').classList.toggle('visible', checked);
    }

    function populateSelect(id, options) {
        const sel = document.getElementById(id);
        options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt.value;
            el.text  = opt.text;
            sel.appendChild(el);
        });
    }

    function populateSelectWithEmpty(id, options, emptyLabel) {
        const sel = document.getElementById(id);
        const blank = document.createElement('option');
        blank.value = '';
        blank.text  = emptyLabel;
        sel.appendChild(blank);
        options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt.value;
            el.text  = opt.text;
            sel.appendChild(el);
        });
    }

    // ─────────────────────────────────────────────
    // Form submit
    // ─────────────────────────────────────────────
    document.getElementById('addTransactionForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const txType  = document.getElementById('modalTxTypeTracker').value;
        const userID  = getUserID();

        // ── Build transaction payload ──────────────────────────────────────
        //
        // IMPORTANT: SAVING transactions use transactionType=SAVING.
        // They are stored in the Transaction table linked to a GoalID.
        // The backend must NEVER include their amount in balance calculations.
        //
        const txPayload = {
            transactionName:   document.getElementById('txTitleInput').value,
            transactionAmount: parseFloat(document.getElementById('txAmountInput').value),
            transactionDate:   document.getElementById('txRealtimeDateInput').value,
            transactionType:   txType,
            transactionNote:   document.getElementById('txNoteInput').value,
            budgetID:  txType === 'EXPENSE' ? document.getElementById('txBudgetSelect')?.value       : null,
            goalID:    txType === 'SAVING'  ? document.getElementById('txGoalSelect')?.value || null : null
        };

        try {
            const res = await fetch(`/api/transactions?userID=${userID}`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(txPayload)
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
        } catch (err) {
            console.error("Transaction save failed:", err);
        }

        // ── If recurring (EXPENSE / INCOME checkbox) ───────────────────────
        const isRecurringExpenseIncome =
            (txType === 'EXPENSE' || txType === 'INCOME') &&
            document.getElementById('txAutoSaveRecurring')?.checked;

        if (isRecurringExpenseIncome) {
            const recurringPayload = {
                budgetID:           txType === 'EXPENSE' ? document.getElementById('txBudgetSelect')?.value : null,
                goalID:             null,
                rTransactionType:   txType,
                rTransactionName:   document.getElementById('txTitleInput').value,
                rTransactionNote:   document.getElementById('txNoteInput').value,
                rTransactionAmount: parseFloat(document.getElementById('txAmountInput').value),
                recurringDay:       parseInt(document.getElementById('recurringDayInput').value) || 1,
                rtStartDate:        document.getElementById('txRealtimeDateInput').value,
                rtEndDate:          document.getElementById('recurringEndDateInput').value || null
            };
            await saveRecurringTemplate(userID, recurringPayload);
        }

        // ── If Monthly Saving Goal (SAVING tab) ────────────────────────────
        const isMonthlySaving =
            txType === 'SAVING' &&
            document.getElementById('txMonthlySavingGoalToggle')?.checked;

        if (isMonthlySaving) {
            const monthlySavingPayload = {
                budgetID:           document.getElementById('txSavingBudgetSelect')?.value || null,
                goalID:             document.getElementById('txGoalSelect')?.value         || null,
                rTransactionType:   'SAVING',
                rTransactionName:   document.getElementById('txTitleInput').value,
                rTransactionNote:   document.getElementById('txNoteInput').value,
                rTransactionAmount: parseFloat(document.getElementById('txAmountInput').value),
                recurringDay:       parseInt(document.getElementById('savingRecurringDayInput').value) || 1,
                rtStartDate:        document.getElementById('txRealtimeDateInput').value,
                rtEndDate:          document.getElementById('savingRecurringEndDateInput').value || null
            };
            await saveRecurringTemplate(userID, monthlySavingPayload);
        }

        closeTxModal();
        await fetchTransactionsFromDB();
    });

    async function saveRecurringTemplate(userID, payload) {
        try {
            const res = await fetch(`/api/recurring?userID=${userID}`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`Recurring save failed HTTP ${res.status}`);
        } catch (err) {
            console.error("Recurring template save failed:", err);
        }
    }

    // ─────────────────────────────────────────────
    // Helpers
    // ─────────────────────────────────────────────
    function getUserID() {
        // Replace with your actual session/localStorage strategy
        return localStorage.getItem('userID') || 1;
    }

    function getMockData() {
        return [
            {
                transactionID: 1, transactionName: "Salary Payout",
                transactionDate: "2026-05-01", transactionAmount: 2500.00,
                transactionType: "INCOME", transactionNote: "Primary job",
                budgetName: "—", goalName: "—", recurringID: null
