<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Transactions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/transaction.css"/>
</head>
<body>

<nav class="navbar">
    <div class="navbar__logo">
        <div class="navbar__logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
        <a class="nav__link active" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
    </div>

    <div class="navbar__right">
        <div class="month-navigation">
            <button class="month-nav-btn" onclick="changeMonth(-1)">←</button>
            <span id="txCalendarNavLabel">Loading...</span>
            <button class="month-nav-btn" onclick="changeMonth(1)">→</button>
        </div>
        <button class="btn-add" onclick="openTxModal()">+ Transaction</button>
        <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
    </div>
</nav>

<main class="page">
    <div class="page-header-row">
        <h2 class="page-title">All transactions</h2>
        <button class="btn-export">Export CSV</button>
    </div>

    <div class="filter-row">
        <button class="filter-pill active" onclick="filterTransactions('ALL')">All</button>
        <button class="filter-pill" onclick="filterTransactions('INCOME')">Income</button>
        <button class="filter-pill" onclick="filterTransactions('EXPENSE')">Expense</button>
        <button class="filter-pill" onclick="filterTransactions('SAVING')">Saving</button>
    </div>

    <div class="card table-card">
        <table class="data-table">
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>DATE</th>
                    <th>AMOUNT</th>
                    <th>TYPE</th>
                    <th>BUDGET</th>
                    <th>GOAL</th>
                    <th>NOTE</th>
                </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
        </table>
    </div>
</main>

<div class="overlay" id="txOverlay" onclick="handleTxOverlayClick(event)">
    <div class="modal">
        <h3 class="modal__title">Add transaction</h3>
        <form id="addTransactionForm">
            
            <div class="type-tabs">
                <button type="button" class="type-tab active" id="modalTabExpense" onclick="setModalTxType('EXPENSE')">Expense</button>
                <button type="button" class="type-tab" id="modalTabIncome" onclick="setModalTxType('INCOME')">Income</button>
                <button type="button" class="type-tab" id="modalTabSaving" onclick="setModalTxType('SAVING')">Saving</button>
            </div>
            
            <input type="hidden" id="modalTxTypeTracker" value="EXPENSE" />

            <div class="form-group">
                <label>Transaction Title</label>
                <input type="text" placeholder="e.g. Walmart Grocery Run" id="txTitleInput" required/>
            </div>
            
            <div class="form-row-2">
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" placeholder="0.00" id="txAmountInput" required/>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="txRealtimeDateInput" required/>
                </div>
            </div>

            <div id="modalDynamicFieldsWrapper">
                </div>

            <div class="form-group">
                <label>Note</label>
                <input type="text" placeholder="Optional descriptions..." id="txNoteInput"/>
            </div>

            <div id="modalAutoSaveFeatureWrapper" style="display: none; margin-top: 15px;">
                <label class="modal-checkbox-container">
                    <input type="checkbox" id="txAutoSaveRecurring">
                    <span class="modal-custom-checkmark"></span>
                    Automatically save this transaction when a new month arrives
                </label>
            </div>

            <div class="modal__footer">
                <button type="button" class="btn-cancel" onclick="closeTxModal()">Cancel</button>
                <button type="submit" class="btn-save">Save transaction</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentFilter = 'ALL';
    let currentActiveDate = new Date();
    let transactionsData = [];

    const monthNamesList = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    // Options sourced precisely to link with your Goal page structures
    const dbOptionsSource = {
        BUDGETS: [
            { value: "FOOD", text: "Food & Groceries" },
            { value: "TRANSPORTATION", text: "Transportation" },
            { value: "ENTERTAINMENT", text: "Entertainment" },
            { value: "UTILITIES", text: "Utilities & Bills" }
        ],
        MONTHLY_SAVING_OPTIONS: [
            { value: "MONTHLY_GOAL", text: "Monthly Saving Goal" }
        ],
        SMALL_SAVING_GOALS: [
            { value: "NEW_LAPTOP", text: "New Laptop Fund" },
            { value: "TRAVEL", text: "China Trip Fund" }
        ]
    };

    function updateNavLabel() {
        document.getElementById('txCalendarNavLabel').innerText = `${monthNamesList[currentActiveDate.getMonth()]} ${currentActiveDate.getFullYear()}`;
    }

    async function changeMonth(direction) {
        currentActiveDate.setMonth(currentActiveDate.getMonth() + direction);
        updateNavLabel();
        await fetchTransactionsFromDB();
    }

    async function fetchTransactionsFromDB() {
        const queryMonth = currentActiveDate.getMonth() + 1;
        const queryYear = currentActiveDate.getFullYear();

        try {
            const response = await fetch(`/api/transactions?month=${queryMonth}&year=${queryYear}`);
            if(!response.ok) throw new Error();
            transactionsData = await response.json();
            renderTransactions();
        } catch (e) {
            // Mock Data matching your new layout spec rules
            transactionsData = [
                { id: 1, name: "Salary Payout", date: "2026-05-01", amount: 2500.00, type: "INCOME", budget: "—", goal: "—", note: "Primary Job Payment" },
                { id: 2, name: "Grocery Run", date: "2026-05-12", amount: 45.50, type: "EXPENSE", budget: "Food & Groceries", goal: "—", note: "Weekly dinner ingredients" },
                { id: 3, name: "Reserve allocation", date: "2026-05-15", amount: 300.00, type: "SAVING", budget: "Monthly Saving Goal", goal: "New Laptop Fund", note: "Automated deposit" }
            ];
            renderTransactions();
        }
    }

    function renderTransactions() {
        const tbody = document.getElementById('transactionTableBody');
        tbody.innerHTML = "";

        const filtered = transactionsData.filter(tx => currentFilter === 'ALL' || tx.type === currentFilter);

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-table-msg">No transaction records found.</td></tr>`;
            return;
        }

        filtered.forEach(tx => {
            const tr = document.createElement('tr');
            let typeClass = tx.type.toLowerCase();
            let sign = tx.type === 'EXPENSE' ? '-' : '+';
            
            tr.innerHTML = `
                <td><strong>${tx.name}</strong></td>
                <td>${tx.date}</td>
                <td><span class="tx-amount-${typeClass}">${sign}$${tx.amount.toFixed(2)}</span></td>
                <td><span class="type-tag tag-${typeClass}">${tx.type}</span></td>
                <td><span class="column-meta-text">${tx.budget || '—'}</span></td>
                <td><span class="column-meta-text">${tx.goal || '—'}</span></td>
                <td class="column-note-text">${tx.note || '—'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function filterTransactions(type) {
        currentFilter = type;
        const pills = document.querySelectorAll('.filter-pill');
        pills.forEach(pill => pill.classList.remove('active'));
        event.target.classList.add('active');
        renderTransactions();
    }

    // Modal view visibility controls
    function openTxModal() { document.getElementById('txOverlay').classList.add('open'); }
    function closeTxModal() { document.getElementById('txOverlay').classList.remove('open'); }
    function handleTxOverlayClick(e) { if(e.target.id === 'txOverlay') closeTxModal(); }
    
    // Smoothly handles rendering correct options into the dynamic wrapper inside the modal
    function setModalTxType(type) {
        document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
        document.getElementById('modalTxTypeTracker').value = type;

        if(type === 'EXPENSE') document.getElementById('modalTabExpense').classList.add('active');
        if(type === 'INCOME') document.getElementById('modalTabIncome').classList.add('active');
        if(type === 'SAVING') document.getElementById('modalTabSaving').classList.add('active');

        const fieldsWrapper = document.getElementById('modalDynamicFieldsWrapper');
        const autoSaveWrapper = document.getElementById('modalAutoSaveFeatureWrapper');
        fieldsWrapper.innerHTML = "";

        if (type === 'EXPENSE') {
            autoSaveWrapper.style.display = "block";
            fieldsWrapper.innerHTML = `
                <div class="form-group">
                    <label>Link to Budget</label>
                    <select id="txBudgetSelect" required></select>
                </div>
            `;
            const sel = document.getElementById('txBudgetSelect');
            dbOptionsSource.BUDGETS.forEach(opt => {
                let el = document.createElement('option');
                el.value = opt.value;
                el.text = opt.text;
                sel.appendChild(el);
            });
        } 
        else if (type === 'INCOME') {
            autoSaveWrapper.style.display = "block";
            // Income completely hides the drop-down fields wrapper row
        } 
        else if (type === 'SAVING') {
            autoSaveWrapper.style.display = "block";
            fieldsWrapper.innerHTML = `
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Link to Monthly Saving</label>
                        <select id="txMonthlySavingSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>Goal</label>
                        <select id="txSmallGoalSelect" required></select>
                    </div>
                </div>
            `;
            
            const mSel = document.getElementById('txMonthlySavingSelect');
            dbOptionsSource.MONTHLY_SAVING_OPTIONS.forEach(opt => {
                let el = document.createElement('option');
                el.value = opt.value;
                el.text = opt.text;
                mSel.appendChild(el);
            });

            const sSel = document.getElementById('txSmallGoalSelect');
            dbOptionsSource.SMALL_SAVING_GOALS.forEach(opt => {
                let el = document.createElement('option');
                el.value = opt.value;
                el.text = opt.text;
                sSel.appendChild(el);
            });
        }
    }

    // Capture and pack popup input form packages
    document.getElementById('addTransactionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const txType = document.getElementById('modalTxTypeTracker').value;
        const payload = {
            name: document.getElementById('txTitleInput').value,
            amount: parseFloat(document.getElementById('txAmountInput').value),
            date: document.getElementById('txRealtimeDateInput').value,
            type: txType,
            note: document.getElementById('txNoteInput').value,
            
            budget: txType === 'EXPENSE' ? document.getElementById('txBudgetSelect').value : null,
            monthlySavingGoal: txType === 'SAVING' ? document.getElementById('txMonthlySavingSelect').value : null,
            smallSavingGoal: txType === 'SAVING' ? document.getElementById('txSmallGoalSelect').value : null,
            autoSave: txType === 'SAVING' ? document.getElementById('txAutoSaveRecurring').checked : false
        };

        console.log("Submitting transaction payload data tracking unit:", payload);
        
        closeTxModal();
        await fetchTransactionsFromDB();
    });

    // Consolidated execution launcher sequence
    document.addEventListener("DOMContentLoaded", async () => {
        document.getElementById('txRealtimeDateInput').valueAsDate = new Date();
        updateNavLabel();
        setModalTxType('EXPENSE'); // Sets default popup state
        await fetchTransactionsFromDB();
    });
</script>
</body>
</html>
