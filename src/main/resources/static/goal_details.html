<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Target Breakdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/goal_details.css"/>
</head>
<body>

<nav class="navbar">

            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0
                       1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12
                       c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182
                       s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2
                       a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10
                       m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2
                       a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link active" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12
                       l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
        <a class="nav__link" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7
                       a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2
                       M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
    </div>

    <div class="navbar__right">
        <span class="navbar__period" id="headerPeriodDisplay">April 2026</span>
        <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
    </div>
</nav>

<main class="page">
    <div class="back-nav-container">
        <a href="goals.html" class="back-link">← Back to goals</a>
    </div>

    <div class="banner-goal-center">
        <div class="banner-emoji" id="displayBannerEmoji">✈️</div>
        <h1 class="banner-title" id="displayBannerTitle">Trip to China</h1>
        <div class="banner-progress-wrap" id="bannerProgressWrapper">
            <div class="progress-container">
                <div class="progress-bar-fill" id="displayBannerProgressFill" style="width: 72%; background: var(--blue);"></div>
            </div>
            <p class="pct-subtitle-text" id="displayBannerProgressPct">72% complete</p>
        </div>
    </div>

    <div class="goal-detail-master-grid">
        
        <div class="card summary-stat-card">
            <span class="detail-card-label" id="labelStatLeft">Saved so far</span>
            <div class="detail-card-amount" id="valStatLeft">$1,080</div>
        </div>
        
        <div class="card summary-stat-card card-remain-bg" id="cardMiddleWrapper">
            <span class="detail-card-label text-danger" id="labelStatMiddle">Remaining</span>
            <div class="detail-card-amount text-danger" id="valStatMiddle">$420</div>
        </div>
        
        <div class="card summary-stat-card card-needed-bg" id="cardRightWrapper">
            <span class="detail-card-label text-amber" id="labelStatRight">Monthly needed</span>
            <div class="detail-card-amount text-amber" id="valStatRight">$210</div>
        </div>

        <div class="vertical-stack-left" id="leftWorkspaceStack">
            <div class="card interactive-workspace-card">
                <div class="card__hdr"><span class="card__title">Deposit to this goal</span></div>
                <form id="goalDepositForm">
                    <div class="form-grid-split">
                        <div class="form-group">
                            <label for="depAmount">Amount ($)</label>
                            <input type="number" step="0.01" id="depAmount" name="amount" value="100" required>
                        </div>
                        <div class="form-group">
                            <label for="depDate">Date</label>
                            <input type="date" id="depDate" name="date" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="depNote">Note (optional)</label>
                        <input type="text" id="depNote" name="note" placeholder="e.g. Flight booking ticket">
                    </div>
                    <button type="button" class="btn-primary-action btn-fit">Deposit</button>
                </form>
            </div>

            <div class="card interactive-workspace-card">
                <div class="card__hdr"><span class="card__title">Saved history</span></div>
                <div class="ledger-history-container" id="historyLedgerContainer">
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Deposit</p><p class="sub-date">Apr 20</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$100</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Deposit</p><p class="sub-date">Mar 21</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$210</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Initial deposit</p><p class="sub-date">Feb 5</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$770</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card interactive-workspace-card settings-card-span" id="settingsPanelCard">
            <div class="card__hdr"><span class="card__title" id="settingsCardTitle">Goal settings</span></div>
            <form id="goalSettingsForm">
                <div class="form-group">
                    <label for="goalName">Goal name</label>
                    <input type="text" id="goalName" name="goalName" value="Trip to China" required>
                </div>
                <div class="form-grid-split">
                    <div class="form-group">
                        <label for="targetAmount">Target amount ($)</label>
                        <input type="number" step="0.01" id="targetAmount" name="targetAmount" value="1500" required>
                    </div>
                    <div class="form-group">
                        <label for="monthlyTarget">Monthly target ($)</label>
                        <input type="number" step="0.01" id="monthlyTarget" name="monthlyTarget" value="210" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="targetDate">Target date</label>
                    <input type="text" id="targetDate" name="targetDate" value="Dec 2026" required>
                </div>
                
                <div class="form-double-actions-footer">
                    <button type="button" class="btn-primary-action" id="btnMainSettingsSubmit">Save changes</button>
                    <button type="button" class="btn-danger-action" id="btnDangerSettingsAction">Delete goal</button>
                </div>
            </form>
        </div>

    </div>
</main>

<!-- Flatpickr for date picking -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
// ==========================================
// Global State
// ==========================================
let userID = null;
let goalID = null;
let currentGoal = null;

// ==========================================
// Initialization
// ==========================================
document.addEventListener('DOMContentLoaded', async () => {
    // Get userID from localStorage
    userID = localStorage.getItem('userID');
    if (!userID) {
        alert('User ID not found. Please log in first.');
        window.location.href = 'index.html';
        return;
    }

    // Get goalID from URL query param
    const urlParams = new URLSearchParams(window.location.search);
    goalID = urlParams.get('goalID') || urlParams.get('id'); // Support both 'goalID' and 'id'
    const action = urlParams.get('action');

    if (!goalID) {
        alert('Goal ID not found.');
        window.location.href = 'goals.html';
        return;
    }

    // Initialize Flatpickr for deposit date
    flatpickr('#depDate', {
        dateFormat: 'Y-m-d',
        defaultDate: 'today'
    });

    // Setup event listeners
    setupEventListeners();

    // Load goal data
    if (goalID === 'new') {
        setupNewGoalUI();
    } else {
        await loadGoalData();
        
        // If action=deposit, scroll to deposit form and focus amount input
        if (action === 'deposit') {
            setTimeout(() => {
                const depositForm = document.getElementById('goalDepositForm');
                if (depositForm) {
                    depositForm.scrollIntoView({ behavior: 'smooth' });
                    document.getElementById('depAmount').focus();
                }
            }, 300); // Small delay to ensure DOM is ready
        }
    }
});

// ==========================================
// Event Listeners Setup
// ==========================================
function setupEventListeners() {
    // Deposit form submission
    document.getElementById('goalDepositForm').addEventListener('submit', (e) => {
        e.preventDefault();
        handleDepositSubmit();
    });

    // Settings form submission (Save Changes)
    document.getElementById('goalSettingsForm').addEventListener('submit', (e) => {
        e.preventDefault();
        handleSaveChanges();
    });

    // Delete goal button
    document.getElementById('btnDangerSettingsAction').addEventListener('click', () => {
        handleDeleteGoal();
    });
}

// ==========================================
// New Goal Setup UI
// ==========================================
function setupNewGoalUI() {
    document.getElementById('displayBannerEmoji').innerText = '✨';
    document.getElementById('displayBannerTitle').innerText = 'Create New Saving Goal';
    
    // Hide progress tracking and history
    document.getElementById('bannerProgressWrapper').style.display = 'none';
    document.getElementById('leftWorkspaceStack').style.display = 'none';
    
    // Update summary cards
    document.getElementById('labelStatLeft').innerText = 'Initial Status';
    document.getElementById('valStatLeft').innerText = 'Drafting';
    document.getElementById('labelStatMiddle').innerText = 'Current Progress';
    document.getElementById('valStatMiddle').innerText = '0%';
    document.getElementById('labelStatRight').innerText = 'Configuration';
    document.getElementById('valStatRight').innerText = 'Pending';

    // Expand settings form
    document.getElementById('settingsPanelCard').classList.remove('settings-card-span');
    document.getElementById('settingsPanelCard').style.gridColumn = '1 / -1';
    document.getElementById('settingsCardTitle').innerText = 'Configure Goal Parameters';

    // Clear form fields
    document.getElementById('goalName').value = '';
    document.getElementById('targetAmount').value = '';
    document.getElementById('monthlyTarget').value = '';
    document.getElementById('targetDate').value = '';

    // Update button labels
    document.getElementById('btnMainSettingsSubmit').innerText = 'Create Goal Target';
    document.getElementById('btnDangerSettingsAction').innerText = 'Reset Fields';
    document.getElementById('btnDangerSettingsAction').setAttribute('type', 'reset');
}

// ==========================================
// Load Goal Data from API
// ==========================================
async function loadGoalData() {
    try {
        const response = await fetch(`/api/goals/${goalID}?userID=${userID}`);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        currentGoal = await response.json();
        updateUIWithGoalData(currentGoal);
    } catch (error) {
        console.error('Error loading goal:', error);
        alert(`Failed to load goal: ${error.message}`);
        window.location.href = 'goals.html';
    }
}

// ==========================================
// Update UI with Goal Data
// ==========================================
function updateUIWithGoalData(goal) {
    // Banner
    document.getElementById('displayBannerTitle').innerText = goal.goalName;

    // Progress bar
    const progress = Math.min(goal.progressPercent, 100);
    const progressBar = document.getElementById('displayBannerProgressFill');
    progressBar.style.width = `${progress}%`;
    progressBar.style.background = getProgressColor(progress);
    
    document.getElementById('displayBannerProgressPct').innerText = `${Math.round(progress)}% complete`;

    // Summary cards
    document.getElementById('valStatLeft').innerText = `$${formatCurrency(goal.currentSaved)}`;
    document.getElementById('valStatMiddle').innerText = `$${formatCurrency(goal.remainingAmount)}`;
    document.getElementById('labelStatRight').innerText = goal.monthlyTarget ? 'Monthly Target' : 'Target Amount';
    document.getElementById('valStatRight').innerText = goal.monthlyTarget 
        ? `$${formatCurrency(goal.monthlyTarget)}` 
        : `$${formatCurrency(goal.goalAmount)}`;

    // Form fields
    document.getElementById('goalName').value = goal.goalName;
    document.getElementById('targetAmount').value = goal.goalAmount;
    document.getElementById('monthlyTarget').value = goal.monthlyTarget || '';
    
    // Format date for input (YYYY-MM-DD or display format)
    const targetDate = new Date(goal.goalTargetDate);
    document.getElementById('targetDate').value = formatDateForInput(targetDate);

    // Update button labels
    document.getElementById('btnMainSettingsSubmit').innerText = 'Save changes';
    document.getElementById('btnDangerSettingsAction').innerText = goal.isCompleted ? 'Delete Goal' : 'Delete Goal';
    document.getElementById('btnDangerSettingsAction').setAttribute('type', 'button');

    // Add Mark as Complete button if not completed
    if (!goal.isCompleted) {
        addMarkCompleteButton();
    } else {
        document.querySelector('.form-double-actions-footer').innerHTML += `
            <div style="grid-column: 1 / -1; text-align: center; padding: 16px; background: #D1FAE5; border-radius: 8px; color: #047857; font-weight: 600;">
                ✓ Goal Completed on ${new Date(goal.goalFinishedDate).toLocaleDateString()}
            </div>
        `;
    }

    // Load deposit history
    loadDepositHistory(goal);
}

// ==========================================
// Add Mark Complete Button
// ==========================================
function addMarkCompleteButton() {
    const footerDiv = document.querySelector('.form-double-actions-footer');
    const completeBtn = document.createElement('button');
    completeBtn.type = 'button';
    completeBtn.className = 'btn-primary-action';
    completeBtn.style.gridColumn = '1 / -1';
    completeBtn.style.background = '#10B981';
    completeBtn.innerText = '✓ Mark as Complete';
    completeBtn.addEventListener('click', handleMarkComplete);
    footerDiv.appendChild(completeBtn);
}

// ==========================================
// Handle Deposit Submit
// ==========================================
async function handleDepositSubmit() {
    if (goalID === 'new') {
        alert('Please create the goal first.');
        return;
    }

    const depAmount = parseFloat(document.getElementById('depAmount').value);
    const depDate = document.getElementById('depDate').value;

    if (!depAmount || depAmount <= 0) {
        alert('Please enter a valid deposit amount.');
        return;
    }

    if (!depDate) {
        alert('Please select a deposit date.');
        return;
    }

    // Confirmation dialog
    const goalName = currentGoal ? currentGoal.goalName : 'this goal';
    const confirmed = confirm(`Deposit $${depAmount.toFixed(2)} on ${depDate} to ${goalName}?`);
    
    if (!confirmed) return;

    try {
        const response = await fetch(`/api/goals/${goalID}/deposit?userID=${userID}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                amount: depAmount,
                depositDate: depDate
            })
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || 'Failed to add deposit');
        }

        const updatedGoal = await response.json();
        currentGoal = updatedGoal;
        updateUIWithGoalData(updatedGoal);
        
        // Reset form
        document.getElementById('goalDepositForm').reset();
        document.getElementById('depDate').valueAsDate = new Date();
        flatpickr('#depDate', { dateFormat: 'Y-m-d', defaultDate: 'today' });
        
        alert('Deposit added successfully! ✓');
    } catch (error) {
        console.error('Error adding deposit:', error);
        alert(`Error: ${error.message}`);
    }
}

// ==========================================
// Handle Save Changes (PUT)
// ==========================================
async function handleSaveChanges() {
    if (goalID === 'new') {
        handleCreateGoal();
        return;
    }

    const goalName = document.getElementById('goalName').value.trim();
    const targetAmount = parseFloat(document.getElementById('targetAmount').value);
    const monthlyTarget = parseFloat(document.getElementById('monthlyTarget').value) || null;
    const targetDate = document.getElementById('targetDate').value;

    if (!goalName || !targetAmount || !targetDate) {
        alert('Please fill in all required fields.');
        return;
    }

    try {
        const response = await fetch(`/api/goals/${goalID}?userID=${userID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                goalName,
                goalAmount: targetAmount,
                goalTargetDate: formatDateForAPI(targetDate),
                monthlyTarget
            })
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || 'Failed to update goal');
        }

        const updatedGoal = await response.json();
        currentGoal = updatedGoal;
        updateUIWithGoalData(updatedGoal);
        alert('Goal updated successfully! ✓');
    } catch (error) {
        console.error('Error saving changes:', error);
        alert(`Error: ${error.message}`);
    }
}

// ==========================================
// Handle Create Goal (POST)
// ==========================================
async function handleCreateGoal() {
    const goalName = document.getElementById('goalName').value.trim();
    const targetAmount = parseFloat(document.getElementById('targetAmount').value);
    const monthlyTarget = parseFloat(document.getElementById('monthlyTarget').value) || null;
    const targetDate = document.getElementById('targetDate').value;

    if (!goalName || !targetAmount || !targetDate) {
        alert('Please fill in all required fields.');
        return;
    }

    try {
        const response = await fetch(`/api/goals?userID=${userID}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                goalName,
                goalAmount: targetAmount,
                goalTargetDate: formatDateForAPI(targetDate),
                monthlyTarget,
                autoMonthly: false
            })
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || 'Failed to create goal');
        }

        alert('Goal created successfully! ✓');
        window.location.href = 'goals.html';
    } catch (error) {
        console.error('Error creating goal:', error);
        alert(`Error: ${error.message}`);
    }
}

// ==========================================
// Handle Mark as Complete (PATCH)
// ==========================================
async function handleMarkComplete() {
    const confirmed = confirm(`Mark "${currentGoal.goalName}" as completed?`);
    if (!confirmed) return;

    try {
        const response = await fetch(`/api/goals/${goalID}/complete?userID=${userID}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' }
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || 'Failed to complete goal');
        }

        const result = await response.json();
        
        // Show completion message
        let message = '🎉 Goal Completed!\n\n';
        if (result.transferredAmount && result.transferredAmount > 0) {
            message += `A SAVING transaction of $${formatCurrency(result.transferredAmount)} was created for the remaining balance.\n\n`;
        }
        message += result.message;
        
        alert(message);
        
        // Reload goal data
        await loadGoalData();
    } catch (error) {
        console.error('Error completing goal:', error);
        alert(`Error: ${error.message}`);
    }
}

// ==========================================
// Handle Delete Goal (DELETE)
// ==========================================
async function handleDeleteGoal() {
    const confirmed = confirm(`Are you sure you want to delete "${currentGoal ? currentGoal.goalName : 'this goal'}"? This action cannot be undone.`);
    if (!confirmed) return;

    try {
        const response = await fetch(`/api/goals/${goalID}?userID=${userID}`, {
            method: 'DELETE'
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || 'Failed to delete goal');
        }

        alert('Goal deleted successfully. ✓');
        window.location.href = 'goals.html';
    } catch (error) {
        console.error('Error deleting goal:', error);
        alert(`Error: ${error.message}`);
    }
}

// ==========================================
// Load Deposit History
// ==========================================
async function loadDepositHistory(goal) {
    // Note: History is typically fetched from transaction query by goalID
    // For now, we'll show a placeholder - backend can return transaction history
    const historyContainer = document.getElementById('historyLedgerContainer');
    
    // The deposit history should be populated from transactions linked to this goal
    // This is a placeholder that would be populated by the backend
    if (!historyContainer.innerHTML.includes('ledger-row-item') && !goal.isCompleted) {
        historyContainer.innerHTML = `
            <div class="ledger-row-item">
                <div class="item-left-cell"><p class="main-title">No deposits yet</p><p class="sub-date">Use the form above to add a deposit</p></div>
                <div class="item-right-cell"><span class="green-tx">-</span></div>
            </div>
        `;
    }
}

// ==========================================
// Utility Functions
// ==========================================
function formatCurrency(value) {
    if (!value) return '0.00';
    return parseFloat(value).toFixed(2);
}

function formatDateForInput(date) {
    if (!date) return '';
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

function formatDateForAPI(dateString) {
    // If already in YYYY-MM-DD format, return as-is
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateString)) {
        return dateString;
    }
    // Otherwise try to parse and format
    const date = new Date(dateString);
    if (isNaN(date.getTime())) {
        return dateString; // Return as-is if invalid
    }
    return formatDateForInput(date);
}

function getProgressColor(progress) {
    if (progress < 33) return 'var(--red)';
    if (progress < 66) return 'var(--blue)';
    return 'var(--green)';
}
</script>
</body>
