<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudDy — Target Breakdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/dashboard.css"/>
    <link rel="stylesheet" href="css/goal_details.css"/>
</head>
<body>

<nav class="navbar">
    <div class="navbar__logo">
        <div class="navbar__logo-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0
                       1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12
                       c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182
                       s2.9-.879 4.006 0l.415.33"/>
            </svg>
        </div>
        <span class="navbar__logo-name">Budget Buddy</span>
    </div>

    <div class="navbar__links">
        <a class="nav__link" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Dashboard
        </a>
        <a class="nav__link" href="budget.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2
                       a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10
                       m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2
                       a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Budget
        </a>
        <a class="nav__link active" href="goals.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12
                       l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            Goals
        </a>
        <a class="nav__link" href="transaction.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7
                       a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2
                       M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Transactions
        </a>
    </div>

    <div class="navbar__right">
        <span class="navbar__period" id="headerPeriodDisplay">April 2026</span>
        <div class="navbar__avatar" onclick="window.location.href='settings.html'">MK</div>
    </div>
</nav>

<main class="page">
    <div class="back-nav-container">
        <a href="goals.html" class="back-link">← Back to goals</a>
    </div>

    <div class="banner-goal-center">
        <div class="banner-emoji" id="displayBannerEmoji">✈️</div>
        <h1 class="banner-title" id="displayBannerTitle">Trip to China</h1>
        <div class="banner-progress-wrap" id="bannerProgressWrapper">
            <div class="progress-container">
                <div class="progress-bar-fill" id="displayBannerProgressFill" style="width: 72%; background: var(--blue);"></div>
            </div>
            <p class="pct-subtitle-text" id="displayBannerProgressPct">72% complete</p>
        </div>
    </div>

    <div class="goal-detail-master-grid">
        
        <div class="card summary-stat-card">
            <span class="detail-card-label" id="labelStatLeft">Saved so far</span>
            <div class="detail-card-amount" id="valStatLeft">$1,080</div>
        </div>
        
        <div class="card summary-stat-card card-remain-bg" id="cardMiddleWrapper">
            <span class="detail-card-label text-danger" id="labelStatMiddle">Remaining</span>
            <div class="detail-card-amount text-danger" id="valStatMiddle">$420</div>
        </div>
        
        <div class="card summary-stat-card card-needed-bg" id="cardRightWrapper">
            <span class="detail-card-label text-amber" id="labelStatRight">Monthly needed</span>
            <div class="detail-card-amount text-amber" id="valStatRight">$210</div>
        </div>

        <div class="vertical-stack-left" id="leftWorkspaceStack">
            <div class="card interactive-workspace-card">
                <div class="card__hdr"><span class="card__title">Deposit to this goal</span></div>
                <form id="goalDepositForm">
                    <div class="form-grid-split">
                        <div class="form-group">
                            <label for="depAmount">Amount ($)</label>
                            <input type="number" step="0.01" id="depAmount" name="amount" value="100" required>
                        </div>
                        <div class="form-group">
                            <label for="depDate">Date</label>
                            <input type="date" id="depDate" name="date" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="depNote">Note (optional)</label>
                        <input type="text" id="depNote" name="note" placeholder="e.g. Flight booking ticket">
                    </div>
                    <button type="button" class="btn-primary-action btn-fit">Deposit</button>
                </form>
            </div>

            <div class="card interactive-workspace-card">
                <div class="card__hdr"><span class="card__title">Saved history</span></div>
                <div class="ledger-history-container" id="historyLedgerContainer">
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Deposit</p><p class="sub-date">Apr 20</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$100</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Deposit</p><p class="sub-date">Mar 21</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$210</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Initial deposit</p><p class="sub-date">Feb 5</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$770</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card interactive-workspace-card settings-card-span" id="settingsPanelCard">
            <div class="card__hdr"><span class="card__title" id="settingsCardTitle">Goal settings</span></div>
            <form id="goalSettingsForm">
                <div class="form-group">
                    <label for="goalName">Goal name</label>
                    <input type="text" id="goalName" name="goalName" value="Trip to China" required>
                </div>
                <div class="form-grid-split">
                    <div class="form-group">
                        <label for="targetAmount">Target amount ($)</label>
                        <input type="number" step="0.01" id="targetAmount" name="targetAmount" value="1500" required>
                    </div>
                    <div class="form-group">
                        <label for="monthlyTarget">Monthly target ($)</label>
                        <input type="number" step="0.01" id="monthlyTarget" name="monthlyTarget" value="210" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="targetDate">Target date</label>
                    <input type="text" id="targetDate" name="targetDate" value="Dec 2026" required>
                </div>
                
                <div class="form-double-actions-footer">
                    <button type="button" class="btn-primary-action" id="btnMainSettingsSubmit">Save changes</button>
                    <button type="button" class="btn-danger-action" id="btnDangerSettingsAction">Delete goal</button>
                </div>
            </form>
        </div>

    </div>
</main>

<script>
    document.getElementById('depDate').valueAsDate = new Date();

    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const goalId = urlParams.get('id');

        // Static Local Mock Database (Simulating what your Spring Boot API will provide later)
        const sampleGoalsDb = {
            "retirement": {
                emoji: "🏦", title: "Retirement Fund", progress: "10%", progressColor: "var(--primary)",
                saved: "$3,000", remain: "$27,000", needed: "$1,500", targetRaw: 30000, monthlyRaw: 1500, dateRaw: "Ongoing",
                history: `
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Monthly Allocation</p><p class="sub-date">May 02</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$1,500</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Initial Transfer</p><p class="sub-date">Apr 11</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$1,500</span><button class="delete-icon-btn">🗑</button></div>
                    </div>`
            },
            "dress": {
                emoji: "👗", title: "New Dress", progress: "78%", progressColor: "var(--green)",
                saved: "$78", remain: "$22", needed: "$22", targetRaw: 100, monthlyRaw: 22, dateRaw: "June 2026",
                history: `
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Saved Birthday Cash</p><p class="sub-date">May 14</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$78</span><button class="delete-icon-btn">🗑</button></div>
                    </div>`
            },
            "china_trip": {
                emoji: "✈️", title: "Trip to China", progress: "72%", progressColor: "var(--blue)",
                saved: "$1,080", remain: "$420", needed: "$210", targetRaw: 1500, monthlyRaw: 210, dateRaw: "Dec 2026",
                history: `
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Deposit</p><p class="sub-date">Apr 20</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$100</span><button class="delete-icon-btn">🗑</button></div>
                    </div>
                    <div class="ledger-row-item">
                        <div class="item-left-cell"><p class="main-title">Deposit</p><p class="sub-date">Mar 21</p></div>
                        <div class="item-right-cell"><span class="green-tx">+$210</span><button class="delete-icon-btn">🗑</button></div>
                    </div>`
            }
        };

        if (goalId === 'new') {
            // ==========================================
            // STATE A: Transforming page to Create a New Goal
            // ==========================================
            document.getElementById('displayBannerEmoji').innerText = "✨";
            document.getElementById('displayBannerTitle').innerText = "Create New Saving Goal";
            
            // Hide progress tracking metrics completely since the goal has no value yet
            document.getElementById('bannerProgressWrapper').style.display = "none";
            document.getElementById('leftWorkspaceStack').style.display = "none"; 
            
            // Reconfigure the top summary boxes to serve as setup indicators
            document.getElementById('labelStatLeft').innerText = "Initial Status";
            document.getElementById('valStatLeft').innerText = "Drafting";
            document.getElementById('labelStatMiddle').innerText = "Current Progress";
            document.getElementById('valStatMiddle').innerText = "0%";
            document.getElementById('labelStatRight').innerText = "Configuration";
            document.getElementById('valStatRight').innerText = "Pending";

            // Expand the configuration settings form to occupy full width comfortably
            document.getElementById('settingsPanelCard').classList.remove('settings-card-span');
            document.getElementById('settingsPanelCard').style.gridColumn = "1 / -1";
            document.getElementById('settingsCardTitle').innerText = "Configure Goal Parameters";

            // Reset setup fields to empty/default states
            document.getElementById('goalName').value = "";
            document.getElementById('targetAmount').value = "";
            document.getElementById('monthlyTarget').value = "";
            document.getElementById('targetDate').value = "";

            // Adjust form button text labels appropriately
            document.getElementById('btnMainSettingsSubmit').innerText = "Create Goal Target";
            document.getElementById('btnDangerSettingsAction').innerText = "Reset Fields";
            document.getElementById('btnDangerSettingsAction').setAttribute("type", "reset");

        } else {
            // ==========================================
            // STATE B: Load Pre-Existing Goal Data Dynamically
            // ==========================================
            const currentGoal = sampleGoalsDb[goalId] || sampleGoalsDb["china_trip"];

            // Render Banner Content
            document.getElementById('displayBannerEmoji').innerText = currentGoal.emoji;
            document.getElementById('displayBannerTitle').innerText = currentGoal.title;
            document.getElementById('displayBannerProgressPct').innerText = `${currentGoal.progress} complete`;
            
            const progressBarFill = document.getElementById('displayBannerProgressFill');
            progressBarFill.style.width = currentGoal.progress;
            progressBarFill.style.background = currentGoal.progressColor;

            // Render Top Metric Blocks
            document.getElementById('valStatLeft').innerText = currentGoal.saved;
            document.getElementById('valStatMiddle').innerText = currentGoal.remain;
            document.getElementById('valStatRight').innerText = currentGoal.needed;

            // Load Historical Statement Rows
            document.getElementById('historyLedgerContainer').innerHTML = currentGoal.history;

            // Populate Form Configuration Inputs
            document.getElementById('goalName').value = currentGoal.title;
            document.getElementById('targetAmount').value = currentGoal.targetRaw;
            document.getElementById('monthlyTarget').value = currentGoal.monthlyRaw;
            document.getElementById('targetDate').value = currentGoal.dateRaw;
        }
    });
</script>
</body>
</html>
